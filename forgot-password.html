<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — EB Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<div class="shell">
  <aside class="brand-panel">
    <div class="brand-mark"><span class="id-chip">EB</span> <span class="brand-word">EB Admin</span></div>
    <div class="brand-tagline">Forgot your password? We'll send a code to get you back in — works for admins and the owner alike.</div>
    <div class="brand-foot">&copy; 2026 EB Portal. All rights reserved.</div>
  </aside>

  <main class="form-panel">
    <div class="form-card">
      <div class="mobile-brand"><span class="id-chip">EB</span> EB Admin</div>
      <h1 class="card-title">Reset your password</h1>
      <p class="card-sub">Enter the email linked to your admin account.</p>

      <div id="alertBox" class="alert"></div>

      <form id="forgotForm" novalidate>
        <div class="field-row">
          <div>
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="sendBtn">Send OTP</button>
      </form>

      <div class="form-foot">
        <a href="index.html">&larr; Back to log in</a>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  const form = document.getElementById("forgotForm");
  const alertBox = document.getElementById("alertBox");
  const sendBtn = document.getElementById("sendBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideAlert(alertBox);

    const email = document.getElementById("email").value.trim();
    if (!email) { showAlert(alertBox, "Please enter your email."); return; }

    setLoading(sendBtn, true, "Sending...");
    const res = await adminApiRequest("/api/admin/forgot-password", { method: "POST", body: { email } });
    setLoading(sendBtn, false);

    if (!res.success) { showAlert(alertBox, res.message || "Something went wrong."); return; }

    sessionStorage.setItem("eb_admin_pending_email", email);
    showAlert(alertBox, res.message, "success");
    setTimeout(() => { window.location.href = "reset-password.html"; }, 1200);
  });
</script>
</body>
</html>
