<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Registration — EB Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<div class="shell">
  <aside class="brand-panel">
    <div class="brand-mark"><span class="id-chip">EB</span> <span class="brand-word">EB Admin</span></div>
    <div class="brand-tagline">Apply for admin access. The CEO reviews and approves every request by email.</div>
    <div class="brand-foot">&copy; 2026 EB Portal. All rights reserved.</div>
  </aside>

  <main class="form-panel">
    <div class="form-card wide">
      <div class="mobile-brand"><span class="id-chip">EB</span> EB Admin</div>
      <h1 class="card-title">Apply for admin access</h1>
      <p class="card-sub">Fill in your details below. Your request will be emailed to the CEO for approval before you can log in.</p>

      <div id="alertBox" class="alert"></div>

      <form id="registerForm" novalidate>
        <div class="field-row cols-3">
          <div>
            <label for="firstName">First name</label>
            <input type="text" id="firstName" required autocomplete="given-name">
          </div>
          <div>
            <label for="middleName">Middle name <span class="optional">(optional)</span></label>
            <input type="text" id="middleName" autocomplete="additional-name">
          </div>
          <div>
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" required autocomplete="family-name">
          </div>
        </div>

        <div class="field-row cols-2">
          <div>
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" placeholder="+91 98765 43210" required autocomplete="tel">
          </div>
          <div>
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="field-row cols-2">
          <div>
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="" disabled selected>Select gender</option>
              <option>Female</option>
              <option>Male</option>
              <option>Other</option>
              <option>Prefer not to say</option>
            </select>
          </div>
          <div></div>
        </div>

        <div class="field-row cols-2">
          <div>
            <label for="photoInput">Photo</label>
            <input type="file" id="photoInput" accept="image/png,image/jpeg,image/webp,image/gif" required>
          </div>
          <div>
            <label for="cvInput">CV (PDF)</label>
            <input type="file" id="cvInput" accept="application/pdf" required>
          </div>
        </div>

        <div class="field-row cols-2">
          <div>
            <label for="password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" required minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" data-target="password">Show</button>
            </div>
          </div>
          <div>
            <label for="confirmPassword">Confirm password</label>
            <div class="pw-wrap">
              <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" data-target="confirmPassword">Show</button>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="registerBtn" style="margin-top:8px;">Submit application</button>
      </form>

      <div class="form-foot">
        Already approved? <a href="index.html">Log in</a>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  if (AdminAuth.isLoggedIn()) {
    window.location.href = "admin-home.html";
  }

  document.querySelectorAll(".pw-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      if (input.type === "password") { input.type = "text"; btn.textContent = "Hide"; }
      else { input.type = "password"; btn.textContent = "Show"; }
    });
  });

  const form = document.getElementById("registerForm");
  const alertBox = document.getElementById("alertBox");
  const registerBtn = document.getElementById("registerBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideAlert(alertBox);

    const firstName = document.getElementById("firstName").value.trim();
    const middleName = document.getElementById("middleName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const gender = document.getElementById("gender").value;
    const photoFile = document.getElementById("photoInput").files[0];
    const cvFile = document.getElementById("cvInput").files[0];
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!firstName || !lastName || !phone || !email || !gender) {
      showAlert(alertBox, "Please fill in all required fields.");
      return;
    }
    if (!photoFile) { showAlert(alertBox, "Please upload a photo."); return; }
    if (!cvFile) { showAlert(alertBox, "Please upload your CV as a PDF."); return; }
    if (cvFile.type !== "application/pdf" && !cvFile.name.toLowerCase().endsWith(".pdf")) {
      showAlert(alertBox, "CV must be a PDF file.");
      return;
    }
    if (password.length < 6) { showAlert(alertBox, "Password must be at least 6 characters."); return; }
    if (password !== confirmPassword) { showAlert(alertBox, "Passwords do not match."); return; }

    const formData = new FormData();
    formData.append("first_name", firstName);
    formData.append("middle_name", middleName);
    formData.append("last_name", lastName);
    formData.append("phone", phone);
    formData.append("email", email);
    formData.append("gender", gender);
    formData.append("password", password);
    formData.append("photo", photoFile);
    formData.append("cv", cvFile);

    setLoading(registerBtn, true, "Submitting...");
    const res = await adminApiUpload("/api/admin/register", formData);
    setLoading(registerBtn, false);

    if (!res.success) {
      showAlert(alertBox, res.message || "Registration failed.");
      return;
    }

    showAlert(alertBox, "Application submitted! The CEO has been emailed for approval. You'll be able to log in once approved.", "success");
    form.reset();
  });
</script>
</body>
</html>
