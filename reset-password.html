<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — EB Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<div class="shell">
  <aside class="brand-panel">
    <div class="brand-mark"><span class="id-chip">EB</span> <span class="brand-word">EB Admin</span></div>
    <div class="brand-tagline">Enter the code from your email and choose a new password.</div>
    <div class="brand-foot">&copy; 2026 EB Portal. All rights reserved.</div>
  </aside>

  <main class="form-panel">
    <div class="form-card">
      <div class="mobile-brand"><span class="id-chip">EB</span> EB Admin</div>
      <h1 class="card-title">Set a new password</h1>
      <p class="card-sub" id="emailSub">Enter the OTP sent to your email along with your new password.</p>

      <div id="alertBox" class="alert"></div>

      <form id="resetForm" novalidate>
        <div class="field-row">
          <div><label for="otp">OTP code</label><input type="text" id="otp" maxlength="6" inputmode="numeric" placeholder="6-digit code" required></div>
        </div>
        <div class="field-row">
          <div>
            <label for="newPassword">New password</label>
            <div class="pw-wrap">
              <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" data-target="newPassword">Show</button>
            </div>
          </div>
        </div>
        <div class="field-row">
          <div>
            <label for="confirmPassword">Confirm new password</label>
            <div class="pw-wrap">
              <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" data-target="confirmPassword">Show</button>
            </div>
          </div>
        </div>

        <div class="otp-timer">
          <button type="button" class="resend-link" id="resendBtn">Resend OTP</button>
        </div>

        <button type="submit" class="btn btn-primary" id="resetBtn">Reset password</button>
      </form>

      <div class="form-foot">
        <a href="index.html">&larr; Back to log in</a>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  const email = sessionStorage.getItem("eb_admin_pending_email");
  if (!email) { window.location.href = "forgot-password.html"; }
  document.getElementById("emailSub").textContent = `Enter the OTP sent to ${email} along with your new password.`;

  document.querySelectorAll(".pw-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      if (input.type === "password") { input.type = "text"; btn.textContent = "Hide"; }
      else { input.type = "password"; btn.textContent = "Show"; }
    });
  });

  const form = document.getElementById("resetForm");
  const alertBox = document.getElementById("alertBox");
  const resetBtn = document.getElementById("resetBtn");
  const resendBtn = document.getElementById("resendBtn");

  resendBtn.addEventListener("click", async () => {
    hideAlert(alertBox);
    resendBtn.disabled = true;
    const res = await adminApiRequest("/api/admin/forgot-password", { method: "POST", body: { email } });
    showAlert(alertBox, res.success ? "A new OTP has been sent." : (res.message || "Could not resend OTP."), res.success ? "success" : "error");
    setTimeout(() => { resendBtn.disabled = false; }, 30000);
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideAlert(alertBox);

    const otp = document.getElementById("otp").value.trim();
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!otp || otp.length !== 6) { showAlert(alertBox, "Please enter the 6-digit OTP."); return; }
    if (newPassword.length < 6) { showAlert(alertBox, "Password must be at least 6 characters."); return; }
    if (newPassword !== confirmPassword) { showAlert(alertBox, "Passwords do not match."); return; }

    setLoading(resetBtn, true, "Resetting...");
    const res = await adminApiRequest("/api/admin/reset-password", {
      method: "POST", body: { email, otp, new_password: newPassword },
    });
    setLoading(resetBtn, false);

    if (!res.success) { showAlert(alertBox, res.message || "Reset failed."); return; }

    sessionStorage.removeItem("eb_admin_pending_email");
    showAlert(alertBox, "Password reset! Redirecting to log in...", "success");
    setTimeout(() => { window.location.href = "index.html"; }, 1200);
  });
</script>
</body>
</html>
